org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=2G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError -Djava.net.preferIPv4Stack=true -Dfile.encoding=UTF-8 -Dsun.nio.ch.disableWEPoll=true
org.gradle.daemon=false
org.gradle.parallel=false
org.gradle.caching=true
org.gradle.configureondemand=false

# Force IPv4 for forked workers (the loopback error originates here).
systemProp.java.net.preferIPv4Stack=true
systemProp.java.net.preferIPv6Addresses=false
systemProp.sun.nio.ch.disableWEPoll=true

# Run Kotlin compiler in-process so it doesn't need a worker daemon
# (workers communicate via TCP loopback and fail when localhost only
# resolves to IPv6 on this machine).
kotlin.compiler.execution.strategy=in-process
kapt.use.worker.api=false

android.useAndroidX=true
# This newDsl flag was added by the Flutter template
android.newDsl=false
# This builtInKotlin flag was added by the Flutter template
android.builtInKotlin=false
