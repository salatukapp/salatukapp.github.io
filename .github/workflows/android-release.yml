name: Android release build

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Resolve dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test test/unit

      - name: Build debug-signed APK
        run: flutter build apk --release

      - name: Build app bundle
        run: flutter build appbundle --release

      - name: Compute checksums
        run: |
          cd build/app/outputs/flutter-apk
          sha256sum app-release.apk > app-release.apk.sha256
          cd ../bundle/release
          sha256sum app-release.aab > app-release.aab.sha256

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/flutter-apk/app-release.apk.sha256
            build/app/outputs/bundle/release/app-release.aab
            build/app/outputs/bundle/release/app-release.aab.sha256

      - name: Upload to workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: salatuk-android
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab
          retention-days: 30
