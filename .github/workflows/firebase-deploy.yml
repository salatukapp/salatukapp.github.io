name: Deploy web to Firebase Hosting (salatuk.web.app)

on:
  push:
    branches: [main]
    paths:
      - 'lib/**'
      - 'web/**'
      - 'assets/**'
      - 'pubspec.yaml'
      - 'firebase.json'
      - '.github/workflows/firebase-deploy.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Resolve dependencies
        run: flutter pub get

      - name: Run unit tests
        run: flutter test test/unit

      - name: Build web (release)
        # Root-domain hosting at salatukapp.web.app — base-href is '/'.
        # --pwa-strategy=none: no service worker (avoids stale-cache bugs).
        # --no-web-resources-cdn: bundle CanvasKit locally instead of fetching
        #   the multi-MB WASM from gstatic.com at startup. Served same-origin
        #   from Firebase's CDN, this cuts a cross-origin round trip and is far
        #   faster/more reliable on slow links — the main cause of slow boot.
        run: flutter build web --release --base-href=/ --pwa-strategy=none --no-web-resources-cdn

      - name: Deploy to Firebase Hosting (live)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: salatukapp
