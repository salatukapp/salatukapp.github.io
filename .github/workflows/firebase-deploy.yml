name: Deploy web to Firebase Hosting (salatuk.web.app)

on:
  push:
    branches: [main]
    paths:
      - 'lib/**'
      - 'web/**'
      - 'assets/**'
      - 'pubspec.yaml'
      - 'firebase.json'
      - '.github/workflows/firebase-deploy.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Resolve dependencies
        run: flutter pub get

      - name: Run unit tests
        run: flutter test test/unit

      - name: Build web (release)
        # Root-domain hosting at salatukapp.web.app — base-href is '/'.
        # --pwa-strategy=none disables the service worker entirely. Flutter's
        # SW aggressively caches the app shell which has caused cache-
        # poisoning bugs during rapid iteration. We trade offline-mode for
        # reliable cache invalidation on every deploy.
        run: flutter build web --release --base-href=/ --pwa-strategy=none

      - name: Deploy to Firebase Hosting (live)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: salatukapp
