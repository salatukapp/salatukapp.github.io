name: Deploy web to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'lib/**'
      - 'web/**'
      - 'assets/**'
      - 'pubspec.yaml'
      - '.github/workflows/web-deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Resolve dependencies
        run: flutter pub get

      - name: Run unit tests
        run: flutter test test/unit

      - name: Build web (release)
        # Repo is named salatukapp.github.io (root user/org page),
        # so base-href is '/' instead of '/<repo>/'.
        # --pwa-strategy=none disables the service worker entirely. Flutter's
        # SW aggressively caches the app shell which has caused cache-
        # poisoning bugs during rapid iteration. The app still works fully
        # online; we lose offline-after-first-visit but gain reliability.
        run: flutter build web --release --base-href=/ --pwa-strategy=none

      - uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
